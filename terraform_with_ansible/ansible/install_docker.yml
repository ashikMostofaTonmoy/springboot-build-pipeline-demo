- name: Install and configure Docker and Nginx with SonarQube and Dependency Track
  hosts: all
  become: true
  vars:
    sonarqube_domain: "sonarqube.grabinsight.com"
    dependency_track_domain: "dtrack.grabinsight.com"
    dependency_track_api_base_url: "dtrackapi.grabinsight.com"
    dtrack_admin_password: "{{ vault_dtrack_admin_password | default('@stadB12345678') }}"
  tasks:
    - name: Update & upgrade apt cache
      apt:
        update_cache: true
        upgrade: yes

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
        state: present

    - name: Create /etc/apt/keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: 0755

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: 0644
    
    - name: Get system architecture
      set_fact:
        system_architecture: "{{ lookup('pipe', 'dpkg --print-architecture') }}"

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch={{ system_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        update_cache: true

    - name: Update apt cache
      apt:
        update_cache: true
        # cache_valid_time: 86400

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        shell: /bin/bash
        groups: docker
        append: true
      loop:
        - ubuntu
        # - "{{ ansible_user }}"
      register: add_to_docker_group_result

    - name: Get latest Docker Compose release version
      uri:
        url: https://api.github.com/repos/docker/compose/releases/latest
        return_content: true
      register: latest_release

    - name: Extract version number
      set_fact:
        version: "{{ (latest_release.content | from_json).tag_name }}"

    - name: Print version number
      debug:
        msg: "Latest Docker Compose version: {{ version }}"

    - name: Install Docker Compose
      get_url:
        url: https://github.com/docker/compose/releases/download/{{ version }}/docker-compose-{{ ansible_system | lower }}-{{ ansible_architecture }}
        dest: /usr/local/bin/docker-compose
        mode: 0755
    
    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Reset ssh connection to allow user changes to affect ansible user
      ansible.builtin.meta:
        reset_connection

    - name: Install nginx and other packages
      apt:
        name:
          - nginx
          - git
          - certbot
          - apache2-utils
          - python3-certbot-nginx
        state: latest
        update_cache: true

    - name: Start nginx
      service:
        name: nginx
        enabled: true
        state: started

    - name: Create Nginx configuration for SonarQube
      template:
        src: sonarqube.conf.j2
        dest: /etc/nginx/sites-available/{{ sonarqube_domain }}
        mode: '0644'

    - name: Create Nginx configuration for Dependency Track API
      template:
        src: dtrack-api.conf.j2
        dest: /etc/nginx/sites-available/{{ dependency_track_api_base_url }}
        mode: '0644'

    - name: Create Nginx configuration for Dependency Track UI
      template:
        src: dtrack-ui.conf.j2
        dest: /etc/nginx/sites-available/{{ dependency_track_domain }}
        mode: '0644'

    - name: Create symbolic link for SonarQube Nginx configuration
      file:
        src: /etc/nginx/sites-available/{{ sonarqube_domain }}
        dest: /etc/nginx/sites-enabled/{{ sonarqube_domain }}
        state: link

    - name: Create symbolic link for Dependency Track API Nginx configuration
      file:
        src: /etc/nginx/sites-available/{{ dependency_track_api_base_url }}
        dest: /etc/nginx/sites-enabled/{{ dependency_track_api_base_url }}
        state: link

    - name: Create symbolic link for Dependency Track UI Nginx configuration
      file:
        src: /etc/nginx/sites-available/{{ dependency_track_domain }}
        dest: /etc/nginx/sites-enabled/{{ dependency_track_domain }}
        state: link

    - name: Remove default Nginx configuration
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test Nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded
      when: nginx_test.rc == 0

    # Sonarqube Docker Compose Setup
    - name: Create sonarqube directory
      file:
        path: /opt/sonarqube
        state: directory
        mode: '0755'

    - name: Copy docker-compose.yml to remote server
      copy:
        src: docker-compose.yaml
        dest: /opt/sonarqube/docker-compose.yaml
        mode: '0644'

    - name: Run docker-compose up
      community.docker.docker_compose_v2:
        project_src: /opt/sonarqube
        state: present
        pull: missing

    # Dependency Track Setup
    - name: Create dependency-track directory
      file:
        path: /opt/dependency-track
        state: directory
        mode: '0755'

    - name: Copy docker-compose.dependency-track.yml to remote server
      copy:
        src: docker-compose.dependency-track.yml
        dest: /opt/dependency-track/docker-compose.yml
        mode: '0644'

    - name: Run dependency-track docker-compose up
      community.docker.docker_compose_v2:
        project_src: /opt/dependency-track
        state: present
        pull: missing

    # DependencyTrack initial configuration
    - name: Wait for DependencyTrack API to be ready
      uri:
        url: "http://localhost:8080/api/version"
        status_code: 200
      register: dtrack_ready
      until: dtrack_ready.status == 200
      retries: 30
      delay: 10

    # Fresh install: admin/admin forces password change on first login.
    # This call is idempotent - fails silently on subsequent runs when
    # password is already changed.
    - name: Set initial admin password (fresh install only)
      uri:
        url: "http://localhost:8080/api/v1/user/forceChangePassword"
        method: POST
        headers:
          Content-Type: "application/x-www-form-urlencoded"
        body: "username=admin&password=admin&newPassword={{ dtrack_admin_password }}&confirmPassword={{ dtrack_admin_password }}"
        status_code: [200, 204, 401, 403]
      no_log: true
      ignore_errors: true

    - name: Login to DependencyTrack
      uri:
        url: "http://localhost:8080/api/v1/user/login"
        method: POST
        headers:
          Content-Type: "application/x-www-form-urlencoded"
        body: "username=admin&password={{ dtrack_admin_password }}"
        return_content: true
        status_code: 200
      register: dtrack_login
      no_log: true

    - name: Enable OSV vulnerability source
      uri:
        url: "http://localhost:8080/api/v2/extension-points/vuln-data-source/extensions/osv/config"
        method: PUT
        headers:
          Authorization: "Bearer {{ dtrack_login.content }}"
          Content-Type: "application/json"
        body_format: json
        body:
          config:
            dataUrl: "https://storage.googleapis.com/osv-vulnerabilities"
            enabled: true
            ecosystems:
              - "Maven"
              - "Go"
              - "npm"
              - "PyPI"
              - "RubyGems"
              - "CRAN"
              - "GHC"
              - "Mageia"
              - "UVI"
              - "Wolfi"
              - "Packagist"
              - "Debian"
              - "GitHub Actions"
              - "SUSE"
              - "openSUSE"
              - "AlmaLinux"
              - "GSD"
              - "Pub"
              - "Ubuntu"
              - "Bitnami"
              - "Red Hat"
              - "Alpine"
              - "crates.io"
              - "OSS-Fuzz"
              - "NuGet"
              - "Android"
              - "GIT"
              - "Rocky Linux"
              - "Linux"
              - "Hackage"
              - "Chainguard"
              - "Hex"
              - "SwiftURL"

            aliasSyncEnabled: true
            incrementalMirroringEnabled: true
        status_code: [200, 204, 304]
      when: dtrack_login.status == 200

    - name: Disable BOM validation (allows Trivy CycloneDX SBOM uploads)
      uri:
        url: "http://localhost:8080/api/v1/configProperty"
        method: POST
        headers:
          Authorization: "Bearer {{ dtrack_login.content }}"
          Content-Type: "application/json"
        body_format: json
        body:
          groupName: "artifact"
          propertyName: "bom.validation.mode"
          propertyValue: "DISABLED"
          propertyType: "STRING"
        status_code: [200, 204]
      when: dtrack_login.status == 200

    - name: Trigger OSV mirror run
      uri:
        url: "http://localhost:8080/api/v2/vuln-data-sources/osv/mirror-runs"
        method: POST
        headers:
          Authorization: "Bearer {{ dtrack_login.content }}"
        status_code: [202, 204]
      when: dtrack_login.status == 200